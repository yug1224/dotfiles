# Repo-local [dotfiles] / bootstrap 制御面。
# [tools] は packages/mise/mise/config.toml（→ ~/.config/mise/）に残す。
min_version = { hard = "2026.7.4" }

[settings]
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
# 安定パス入口（初回は config 相対 source なので ~/.dotfiles 不要）
"~/.dotfiles" = { source = ".", mode = "symlink" }
"~/.tigrc" = { source = "packages/tig/.tigrc", mode = "symlink" }
"~/.config/rtk" = { source = "packages/rtk/rtk", mode = "symlink" }
"~/Library/Preferences/pnpm/rc" = { source = "packages/pnpm/rc", mode = "symlink" }
"~/.config/git" = { source = "packages/git/git", mode = "symlink" }
"~/.zshrc" = { source = "packages/zsh/.zshrc", mode = "symlink" }
"~/.zprofile" = { source = "packages/zsh/.zprofile", mode = "symlink" }
"~/.zpreztorc" = { source = "packages/zsh/.zpreztorc", mode = "symlink" }
"~/.zsh_plugins" = { source = "packages/zsh/.zsh_plugins", mode = "symlink" }
"~/.config/shared" = { source = "packages/shared/shared", mode = "symlink" }
